<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Для моей любимой</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&display=swap');
        
        body {
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(180deg, #fff5f7 0%, #ffe4e9 100%);
            overflow: hidden;
            height: 100vh;
        }

        .heart-btn {
            background: #ff4d6d;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
            transition: all 0.3s ease;
        }

        .heart-btn:active {
            transform: scale(0.9);
        }

        .cloud-text {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease;
        }

        .swiper-slide-active .cloud-text {
            opacity: 1;
            transform: translateY(0);
        }

        /* Хвостик облачка */
        .cloud-text::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 15px solid rgba(255, 255, 255, 0.9);
        }

        .photo-frame {
            width: 100%;
            height: 60vh;
            border-radius: 30px;
            object-fit: cover;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div id="start-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-[#fff5f7]">
        <div class="text-center p-6">
            <h1 class="text-2xl mb-8 text-[#ff4d6d] font-light tracking-widest">ДЛЯ ТЕБЯ</h1>
            <button onclick="startApp()" class="heart-btn w-20 h-20 rounded-full flex items-center justify-center animate-bounce">
                <svg xmlns="http://www.w3.org/2000/svg" fill="white" viewBox="0 0 24 24" width="32" height="32">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
            </button>
        </div>
    </div>

    <div id="main-content" class="hidden h-full">
        <div class="swiper mySwiper h-full">
            <div class="swiper-wrapper">
                
                <div class="swiper-slide flex flex-col items-center justify-center p-6">
                    <div class="cloud-text p-5 mb-8 text-center text-gray-700 max-w-[80%]">
                        Здесь будет твой первый текст поздравления ❤️
                    </div>
                    <img src="https://via.placeholder.com/600x900" class="photo-frame" alt="Фото 1">
                </div>

                <div class="swiper-slide flex flex-col items-center justify-center p-6">
                    <div class="cloud-text p-5 mb-8 text-center text-gray-700 max-w-[80%]">
                        А здесь — еще одно милое воспоминание... ✨
                    </div>
                    <img src="https://via.placeholder.com/600x900" class="photo-frame" alt="Фото 2">
                </div>

                <div class="swiper-slide flex flex-col items-center justify-center p-6">
                    <div class="cloud-text p-5 mb-8 text-center text-gray-700 max-w-[80%]">
                        Люблю тебя больше всего на свете!
                    </div>
                    <img src="https://via.placeholder.com/600x900" class="photo-frame" alt="Фото 3">
                </div>

            </div>
            <div class="absolute bottom-10 w-full text-center text-[#ff4d6d] opacity-50 text-sm animate-pulse">
                смахни влево ←
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        function startApp() {
            document.getElementById('start-screen').classList.add('opacity-0');
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('main-content').classList.remove('hidden');
                initSwiper();
            }, 500);
        }

        function initSwiper() {
            new Swiper(".mySwiper", {
                effect: "creative",
                grabCursor: true,
                creativeEffect: {
                    prev: {
                        shadow: true,
                        translate: ["-20%", 0, -1],
                    },
                    next: {
                        translate: ["100%", 0, 0],
                    },
                },
            });
        }
    </script>
</body>
</html>
