<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Для моей любимой</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;600&display=swap');
        
        :root {
            --cute-pink: #ff4d6d;
            --light-pink: #fff5f7;
            --bg-gradient: linear-gradient(180deg, #fff5f7 0%, #ffe4e9 100%);
        }

        body {
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-gradient);
            overflow: hidden;
            height: 100vh;
            /* Учет "челки" Dynamic Island на iPhone 16 Pro Max */
            padding-top: env(safe-area-inset-top); 
            padding-bottom: env(safe-area-inset-bottom);
        }

        .heart-btn {
            background: var(--cute-pink);
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
            transition: all 0.3s ease;
        }

        .heart-btn:active {
            transform: scale(0.9);
        }

        /* Улучшенное "Облачко" с эффектом стекла */
        .cloud-text {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .swiper-slide-active .cloud-text {
            opacity: 1;
            transform: translateY(0);
        }

        /* Хвостик облачка */
        .cloud-text::after {
            content: '';
            position: absolute;
            bottom: -11px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 15px solid rgba(255, 255, 255, 0.7);
        }

        /* Рамка для фото */
        .photo-frame {
            width: 90%;
            height: 60vh;
            border-radius: 35px;
            object-fit: cover;
            box-shadow: 0 25px 50px rgba(0,0,0,0.12);
            border: 4px solid white;
        }

        /* Стильная кнопка музыки в стиле iOS */
        .music-toggle {
            position: fixed;
            top: env(safe-area-inset-top, 20px);
            right: 20px;
            z-index: 60;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .music-toggle.muted svg {
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <audio id="global-audio" loop></audio>

    <div id="music-control" class="music-toggle hidden" onclick="toggleMusic()">
        <svg id="music-icon-on" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ff4d6d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
    </div>

    <div id="start-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-[#fff5f7]">
        <div class="text-center p-6 flex flex-col items-center">
            <h1 class="text-3xl mb-12 text-[#ff4d6d] font-semibold tracking-widest opacity-80">ДЛЯ ТЕБЯ</h1>
            <button onclick="startApp()" class="heart-btn w-24 h-24 rounded-full flex items-center justify-center animate-bounce">
                <svg xmlns="http://www.w3.org/2000/svg" fill="white" viewBox="0 0 24 24" width="40" height="40">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
            </button>
            <p class="mt-8 text-sm text-gray-400 font-light">нажми</p>
        </div>
    </div>

    <div id="main-content" class="hidden h-full">
        <div class="swiper mySwiper h-full">
            <div id="swiper-wrapper" class="swiper-wrapper">
                </div>
            
            <div id="swipe-hint" class="absolute bottom-12 w-full text-center text-[#ff4d6d] opacity-50 text-sm animate-pulse z-40">
                смахни ←
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

                music: 'muz/kiraL.mp3'   // Ссылка на музыку (MP3)
            },
		{
                photo: 'imgg/loveCola.webp', // Ссылка на фото
                cloudText: 'А ты любишь нас и колу без сахара :)',         // Текст в облачке
                music: 'muz/loveCola.mp3'   // Ссылка на музыку (MP3)
            },
		{
                photo: 'imgg/kylich.webp', // Ссылка на фото
                cloudText: 'Ты у меня самый лучший кондитер в мире!!!',         // Текст в облачке
                music: 'muz/kylich.mp3'   // Ссылка на музыку (MP3)
            },
		{
                photo: 'imgg/kira2.webp', // Ссылка на фото
                cloudText: 'ПРИВЕТ',         // Текст в облачке
                music: 'muz/kira2.mp3'   // Ссылка на музыку (MP3)
            },
		{
                photo: 'imgg/lovedog.webp', // Ссылка на фото
                cloudText: 'Я хочу сказать тебе спасибо за то, что ты у меня такая хорошая ❤️',         // Текст в облачке
                music: 'muz/lovedog.mp3'   // Ссылка на музыку (MP3)
            },
		{
                photo: 'imgg/povar1.webp', // Ссылка на фото
                cloudText: 'Пока твои сверсники вредят себе, даже наркоманят!!! ты у меня нюхаешь сахарную пудру',         // Текст в облачке
                music: 'muz/povar1.mp3'   // Ссылка на музыку (MP3)
            },
		{
                photo: 'imgg/tort8.webp', // Ссылка на фото
                cloudText: 'Пусть у тебя будет всегда все хорошо в твоих начинаниях и вообще всегда все хорошо',         // Текст в облачке
                music: 'muz/tort8.mp3'   // Ссылка на музыку (MP3)
            },
		{
                photo: 'imgg/kylich.webp', // Ссылка на фото
                cloudText: 'У тебя безумно вкусные куличи получились, хотя ты только первый раз их делаешь, ты большая умничка!!!',         // Текст в облачке
                music: 'muz/kylich.mp3'   // Ссылка на музыку (MP3)
            },
		{

                cloudText: 'За зубками нужно следить!!!',         // Текст в облачке
                music: 'muz/LZ.mp3'   // Ссылка на музыку (MP3)

		{

                cloudText: 'Именно по этому ты сама поставила себе брекеты. Умничка моя! ❤️',         // Текст в облачке
                music: 'muz/br.mp3'   // Ссылка на музыку (MP3)
            },
		{

                cloudText: 'А еще ты у меня модница',         // Текст в облачке

            },
		{
                photo: 'imgg/pervtort.webp', // Ссылка на фото
                cloudText: 'Я тебя буду всегда поддерживать во всем! Обязательно буду рядом ❤️ всегда-всегда',         // Текст в облачке
                music: 'muz/pervtort.mp3'   // Ссылка на музыку (MP3)
            },
		{
                photo: 'imgg/povar.webp', // Ссылка на фото
                cloudText: 'А так же ты у меня лучший повар, если я попрошу, ты сделаешь отменное блюдо',         // Текст в облачке
                music: 'muz/povar.mp3'   // Ссылка на музыку (MP3)
            },
		{
                photo: 'imgg/kira.webp', // Ссылка на фото
                cloudText: 'АМОГУС',         // Текст в облачке
                music: 'muz/kira.mp3'   // Ссылка на музыку (MP3)
            },
		{
                photo: 'imgg/kira4.webp', // Ссылка на фото
                cloudText: 'Туалет',         // Текст в облачке
                music: 'muz/kira4.mp3'   // Ссылка на музыку (MP3)
            },
		{
                photo: 'imgg/dr.webp', // Ссылка на фото
                cloudText: 'С тобой я счастлив ❤️',         // Текст в облачке
                music: 'muz/dr.mp3'   // Ссылка на музыку (MP3)
            },
		{
                photo: 'imgg/boleet.webp', // Ссылка на фото
                cloudText: 'Никогда не болей прошу тебя :( Я если вдруг приболеешь я тебе помогу быстро выздороветь!',         // Текст в облачке
                music: 'muz/boleet.mp3'   // Ссылка на музыку (MP3)
            },
		{
                photo: 'imgg/gta5ser.webp', // Ссылка на фото
                cloudText: 'Люблю ❤️',         // Текст в облачке
                music: 'muz/gta5ser.mp3'   // Ссылка на музыку (MP3)
            }
        ];

        const audioPlayer = document.getElementById('global-audio');
        const musicControl = document.getElementById('music-control');
        let swiper;

        // Генерация HTML слайдов из данных
        function renderSlides() {
            const wrapper = document.getElementById('swiper-wrapper');
            mySlidesData.forEach((slide, index) => {
                const slideHtml = `
                    <div class="swiper-slide flex flex-col items-center justify-center p-6">
                        <div class="cloud-text p-6 mb-10 text-center text-gray-800 max-w-[85%] font-medium">
                            ${slide.cloudText}
                        </div>
                        <img src="${slide.photo}" class="photo-frame" alt="Фото ${index + 1}">
                    </div>
                `;
                wrapper.insertAdjacentHTML('beforeend', slideHtml);
            });
        }

        function startApp() {
            renderSlides();
            
            document.getElementById('start-screen').classList.add('opacity-0');
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('main-content').classList.remove('hidden');
                musicControl.classList.remove('hidden');
                initSwiper();
                
                // Запускаем музыку первого слайда сразу после нажатия на сердце
                playSlideMusic(0);
            }, 500);
        }

        function initSwiper() {
            swiper = new Swiper(".mySwiper", {
                effect: "creative",
                grabCursor: true,
                speed: 800, // Медленнее и плавнее
                creativeEffect: {
                    prev: {
                        // Чистый эффект сдвига и масштабирования, БЕЗ ТЕНЕЙ (тонировки)
                        translate: ["-20%", 0, -1],
                        scale: 0.8,
                        opacity: 0.5
                    },
                    next: {
                        // Чистый эффект захода следующего слайда справа
                        translate: ["100%", 0, 0],
                    },
                },
                on: {
                    slideChange: function () {
                        // При смахивании меняем музыку
                        playSlideMusic(this.activeIndex);
                        
                        // Скрываем подсказку после первого смахивания
                        if (this.activeIndex > 0) {
                            document.getElementById('swipe-hint').classList.add('hidden');
                        }
                    },
                },
            });
        }

        // Функция переключения музыки для слайда
        function playSlideMusic(index) {
            const musicUrl = mySlidesData[index].music;
            if (musicUrl && !audioPlayer.muted) {
                // Если ссылка на музыку изменилась, обновляем плеер
                if (audioPlayer.src !== musicUrl) {
                    audioPlayer.src = musicUrl;
                    audioPlayer.load();
                }
                audioPlayer.play().catch(error => console.log("Autoplay blocked:", error));
            }
        }

        // Кнопка Вкл/Выкл звук
        function toggleMusic() {
            if (audioPlayer.muted) {
                audioPlayer.muted = false;
                musicControl.classList.remove('muted');
                playSlideMusic(swiper.activeIndex); // Включаем музыку текущего слайда
            } else {
                audioPlayer.muted = true;
                musicControl.classList.add('muted');
                audioPlayer.pause();
            }
        }
    </script>
</body>
</html>
